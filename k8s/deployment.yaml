apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-mcp-server
  namespace: production
  labels:
    app: aks-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aks-mcp-server
  template:
    metadata:
      labels:
        app: aks-mcp-server
    spec:
      serviceAccountName: mcp-server
      nodeSelector:
        agentpool: apps
      containers:
      - name: mcp-server
        image: esarathmails/aks-mcp-server:latest
        ports:
        - containerPort: 8080
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
